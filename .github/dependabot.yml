---
version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"
    assignees:
      - "SimplicityGuy"
    groups:
      actions:
        patterns:
          - "*"

  # Docker base image for the exporter
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    assignees:
      - "SimplicityGuy"
    groups:
      docker-images:
        patterns:
          - "*"

  # Python dependencies (uv-managed; dependabot uses pip ecosystem to read pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    assignees:
      - "SimplicityGuy"
    open-pull-requests-limit: 10
    groups:
      python-production:
        dependency-type: "production"
        patterns:
          - "*"
      python-development:
        dependency-type: "development"
        patterns:
          - "*"
      python-security:
        applies-to: security-updates
        patterns:
          - "*"
